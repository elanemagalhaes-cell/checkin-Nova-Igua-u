<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Check-in HUB</title>

<style>
:root{
  --bg:#ffffff;
  --orange-1:#ff8a1e;
  --orange-2:#ff6a00;
  --orange-3:#ff4d00;
  --success:#16a34a;
  --error:#dc2626;
}
*{box-sizing:border-box}
body{
  margin:0;
  background:var(--bg);
  font-family:system-ui;
}
.wrap{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}
.card{
  width:600px;
  background:linear-gradient(180deg,var(--orange-1),var(--orange-2),var(--orange-3));
  border-radius:30px;
  padding:40px;
  color:#fff;
  text-align:center;
}
input{
  width:100%;
  padding:20px;
  font-size:30px;
  border-radius:20px;
  border:0;
  margin-bottom:20px;
  text-align:center;
}
button{
  width:100%;
  padding:20px;
  font-size:22px;
  border-radius:20px;
  border:0;
  cursor:pointer;
}
.resp{
  margin-top:20px;
  font-size:20px;
  white-space:pre-line;
}
.success{color:#16a34a;}
.error{color:#dc2626;}
</style>
</head>

<body>

<div class="wrap">
  <div class="card">
    <h1>Check-in HUB</h1>

    <input id="id_driver" placeholder="Digite o ID" maxlength="7"/>

    <button onclick="sendCheckin()">Registrar</button>

    <div id="resp" class="resp"></div>
  </div>
</div>

<script>

// 🔥 SUA URL JÁ CONFIGURADA
const API_BASE_URL = "https://script.google.com/a/macros/shopee.com/s/AKfycbynb3yJxQ7r9tmttiQqcfI3hUsoZHZP_Av6sItKPwLkk8if6PcRFF9OApljGNIvKmdi/exec";

const $ = id => document.getElementById(id);

function getDeviceId(){
  let v = localStorage.getItem("DEVICE_ID");
  if(!v){
    v = Date.now() + "_" + Math.random();
    localStorage.setItem("DEVICE_ID", v);
  }
  return v;
}

async function getGeo(){
  return new Promise(res=>{
    navigator.geolocation.getCurrentPosition(
      p=>res({
        lat:p.coords.latitude,
        lng:p.coords.longitude,
        accuracy:p.coords.accuracy
      }),
      ()=>res({lat:null,lng:null,accuracy:null}),
      {enableHighAccuracy:true}
    );
  });
}

async function sendCheckin(){
  const resp = $("resp");
  resp.className="resp";
  resp.textContent="Enviando...";

  const id_driver = $("id_driver").value.trim();

  if(!id_driver){
    resp.classList.add("error");
    resp.textContent="Informe o ID";
    return;
  }

  const geo = await getGeo();

  const payload = {
    id_driver,
    lat: geo.lat,
    lng: geo.lng,
    accuracy: geo.accuracy,
    device_id: getDeviceId(),
    ua: navigator.userAgent,
    device_ts: new Date().toISOString(),
    origem: "github"
  };

  console.log("ENVIANDO:", payload);

  try{
    const r = await fetch(API_BASE_URL,{
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body: JSON.stringify(payload)
    });

    const data = await r.json();

    resp.className="resp";
    resp.classList.add(data.ok ? "success" : "error");

    resp.textContent = data.msg;

  }catch(e){
    resp.className="resp error";
    resp.textContent="Erro ao conectar com o servidor";
  }
}

</script>

</body>
</html>
