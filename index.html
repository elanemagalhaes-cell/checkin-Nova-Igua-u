<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Check-in HUB</title>
<style>
:root{
  --bg:#ffffff;
  --orange-1:#ff8a1e;
  --orange-2:#ff6a00;
  --orange-3:#ff4d00;
  --success:#16a34a;
  --error:#dc2626;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);font-family:system-ui}
.wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{width:min(600px,95vw);background:linear-gradient(180deg,var(--orange-1),var(--orange-2),var(--orange-3));border-radius:30px;padding:40px;color:#fff;text-align:center}
input{width:100%;padding:20px;font-size:30px;border-radius:20px;border:0;margin-bottom:20px;text-align:center}
button{width:100%;padding:20px;font-size:22px;border-radius:20px;border:0;cursor:pointer}
.resp{margin-top:20px;font-size:20px;white-space:pre-line}
.success{color:#16a34a}
.error{color:#dc2626}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <h1>Check-in HUB</h1>
    <input id="id_driver" placeholder="Digite o ID" maxlength="7"/>
    <button onclick="sendCheckin()">Registrar</button>
    <div id="resp" class="resp"></div>
  </div>
</div>

<script>
const API_BASE_URL = "https://script.google.com/a/macros/shopee.com/s/AKfycbynb3yJxQ7r9tmttiQqcfI3hUsoZHZP_Av6sItKPwLkk8if6PcRFF9OApljGNIvKmdi/exec";

const $ = id => document.getElementById(id);

function getDeviceId(){
  let v = localStorage.getItem("DEVICE_ID");
  if(!v){
    v = Date.now() + "_" + Math.random().toString(16).slice(2);
    localStorage.setItem("DEVICE_ID", v);
  }
  return v;
}

async function getGeo(){
  return new Promise(res=>{
    if(!navigator.geolocation){
      return res({lat:null,lng:null,accuracy:null});
    }
    navigator.geolocation.getCurrentPosition(
      p=>res({
        lat:p.coords.latitude,
        lng:p.coords.longitude,
        accuracy:p.coords.accuracy
      }),
      ()=>res({lat:null,lng:null,accuracy:null}),
      {enableHighAccuracy:true,timeout:10000,maximumAge:60000}
    );
  });
}

function jsonpRequest(url){
  return new Promise((resolve, reject) => {
    const cbName = "jsonp_cb_" + Date.now() + "_" + Math.floor(Math.random()*100000);
    const script = document.createElement("script");

    window[cbName] = function(data){
      cleanup();
      resolve(data);
    };

    function cleanup(){
      try { delete window[cbName]; } catch(_) {}
      if (script.parentNode) script.parentNode.removeChild(script);
    }

    script.onerror = function(){
      cleanup();
      reject(new Error("Falha ao carregar o script remoto."));
    };

    script.src = url + (url.includes("?") ? "&" : "?") + "callback=" + cbName;
    document.body.appendChild(script);

    setTimeout(() => {
      if (window[cbName]) {
        cleanup();
        reject(new Error("Tempo de resposta excedido."));
      }
    }, 15000);
  });
}

async function sendCheckin(){
  const resp = $("resp");
  resp.className = "resp";
  resp.textContent = "Enviando...";

  const id_driver = $("id_driver").value.trim();

  if(!id_driver){
    resp.classList.add("error");
    resp.textContent = "Informe o ID";
    return;
  }

  const geo = await getGeo();

  const params = new URLSearchParams({
    action: "register",
    id_driver: id_driver,
    lat: geo.lat ?? "",
    lng: geo.lng ?? "",
    accuracy: geo.accuracy ?? "",
    device_id: getDeviceId(),
    ua: navigator.userAgent,
    device_ts: new Date().toISOString(),
    origem: "github"
  });

  const url = API_BASE_URL + (API_BASE_URL.includes("?") ? "&" : "?") + params.toString();

  try {
    const data = await jsonpRequest(url);

    resp.className = "resp";
    resp.classList.add(data && data.ok ? "success" : "error");
    resp.textContent = data && data.msg ? data.msg : "Sem resposta do servidor.";
  } catch (e) {
    resp.className = "resp error";
    resp.textContent = "Erro ao conectar ao servidor: " + e.message;
  }
}

document.getElementById("id_driver").addEventListener("keydown", e => {
  if (e.key === "Enter") sendCheckin();
});
</script>
</body>
</html>
